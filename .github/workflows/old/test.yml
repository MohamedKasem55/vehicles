name: test project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Setup NodeJs
        uses: actions/setup-node@v3
        with:
          node-version: 22.9.0
      - name: Install Dependencies
        run: npm ci
      - name : Run Tests
        run: npm run test

          