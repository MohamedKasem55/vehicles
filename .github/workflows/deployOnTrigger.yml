name: Deploy to Vercel On http trigger
on:
  repository_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Setup Nodejs
        uses: actions/setup-node@v3
        with:
          node-version: 22.9.0
      - name: Install Dependencies
        run: npm ci
      - name: Build Project
        run: npm run build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Output Deployment URL
        run: |
          if [ "${{ steps.deploy-prod.outputs.preview-url }}" != "" ]; then
            echo "Production URL: ${{ steps.deploy-prod.outputs.preview-url }}"
          fi
          if [ "${{ steps.deploy-preview.outputs.preview-url }}" != "" ]; then
            echo "Preview URL: ${{ steps.deploy-preview.outputs.preview-url }}"
          fi
    
    
